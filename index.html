<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Portfolio cá nhân</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            color: #fff;
        }

        /* HERO */
        .hero {
            height: 100vh;
            background: url("zipnerf/img/Ảnh Rừng.jpg");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: 50px;
        }

        .hero p {
            margin-top: 10px;
            font-size: 20px;
        }

        /* NAV */
        nav {
            position: fixed;
            width: 100%;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        /* SECTION */
        section {
            padding: 80px 20px;
            text-align: center;
        }

        .about {
            background: #2e7d32;
        }

        .hobby {
            background: #388e3c;
        }

        .activity {
            background: #43a047;
        }

        .contact {
            background: #1b5e20;
        }

        h2 {
            margin-bottom: 20px;
        }

        .box {
            max-width: 800px;
            margin: auto;
        }

        /* IMAGE */
        .about img {
            width: 300px;              
            height: 300px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 25px;
            border: 5px solid white;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
        }

        /* FOOTER */
        footer {
            background: black;
            text-align: center;
            padding: 15px;
        }
    <.intro {
        color: white;
        font-size: 24px;
        margin-top: 15px;

        opacity: 0;
        transform: translateY(30px);
        animation: fadeUp 1.5s ease forwards;
}

/* Animation */
@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}>
</head>
<body>

    <!-- MENU -->
    <nav>
        <a href="#about">Giới thiệu</a>
        <a href="#hobby">Sở thích</a>
        <a href="#activity">Hoạt động</a>
        <a href="#contact">Liên hệ</a>
    </nav>

    <!-- HERO -->
    <div class="hero">
        <div>
            <h1>Xin chào, mình là Tuyết 🌿</h1>
            <p>Yêu thiên nhiên • Thích khám phá • Học hỏi mỗi ngày</p>
        </div>
    </div>

    <!-- GIỚI THIỆU -->
    <section id="about" class="about">
        <div class="box">
            <img src="zipnerf/img/Tuyết.jpg">
            <h2>Giới thiệu</h2>
            <p>
                Mình là sinh viên đang học và phát triển kỹ năng về công nghệ và quản trị.
                Mình yêu thích thiên nhiên, cây cối và luôn muốn tạo ra những giá trị tích cực.
            </p>
        </div>
    </section>

    <!-- SỞ THÍCH -->
    <section id="hobby" class="hobby">
        <div class="box">
            <h2>Sở thích</h2>
            <p>🌱 Chơi thể thao (cầu lông)</p>
            <p>🎬 Xem phim</p>
            <p>📚 Học những điều mới</p>
            <p>🌿 Đi dạo và hòa mình vào thiên nhiên</p>
        </div>
    </section>

    <!-- HOẠT ĐỘNG -->
    <section id="activity" class="activity">
        <div class="box">
            <h2>Hoạt động ngoại khoá</h2>
            <p>✔ Tham gia các hoạt động nhóm tại trường</p>
            <p>✔ Hỗ trợ giảng dạy tiếng Anh cho học sinh</p>
            <p>✔ Tham gia các dự án học tập và nghiên cứu</p>
        </div>
    </section>

    <!-- LIÊN HỆ -->
    <section id="contact" class="contact">
        <div class="box">
            <h2>Liên hệ</h2>
            <p>Email: tuyet@example.com</p>
            <p>Facebook: facebook.com/tuyet</p>
            <p>SĐT: 0123 456 789</p>
        </div>
    </section>

    <footer>
        <p>© 2026 Tuyết - Portfolio cá nhân</p>
    </footer>

</body>
</html>
